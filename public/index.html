<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DailyStamp</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">DailyStamp</p>
        <h1>毎日の達成を、カレンダーに残す。</h1>
        <p class="lead">
          Discord のパネルから開いた自分専用ページで、日付と習慣を選んでスタンプを押せます。
        </p>
        <form id="stamp-form" class="stamp-form">
          <label class="field">
            <span>日付</span>
            <input id="stamp-date" name="stamp-date" type="date" required />
          </label>
          <label class="field">
            <span>習慣</span>
            <select id="habit-select" name="habit-select" required></select>
          </label>
          <button id="stamp-submit" type="submit">STAMP を押す</button>
        </form>
        <div class="toolbar">
          <button id="prev-month" type="button">前の月</button>
          <div>
            <p id="month-label" class="month-label"></p>
            <p id="today-label" class="today-label"></p>
          </div>
          <button id="next-month" type="button">次の月</button>
        </div>
      </section>

      <section id="status" class="status-card">読み込み中...</section>
      <section id="selection-hint" class="selection-hint"></section>
      <section id="habit-list" class="habit-list"></section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
